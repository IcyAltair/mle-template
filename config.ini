[DATA]
raw_train = data/raw/fashion-mnist_train.csv
raw_test  = data/raw/fashion-mnist_test.csv

[PREPROCESS]
val_size = 0.1
random_state = 42
normalize = true

[MODEL]
type = logreg

[LOGREG]
C = 1.0
max_iter = 200
n_jobs = -1

[ARTIFACTS]
model_path = artifacts/model.joblib
metrics_path = artifacts/metrics.json