name: CI (docker compose)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  IMAGE: akp1n/catdog-api

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (compose)
        run: docker compose build

      - name: Run container (tests + metrics + api)
        run: |
          docker compose up -d --remove-orphans
          docker compose ps
          docker compose logs --no-color --tail 300

      - name: Stop container
        if: always()
        run: docker compose down --remove-orphans

  push-image:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (latest + commit tag)
        run: |
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}