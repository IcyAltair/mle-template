name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure DVC remote (S3/MinIO)
        run: |
          dvc remote modify minio endpointurl "${{ secrets.DVC_S3_ENDPOINT }}"
          dvc remote modify minio access_key_id "${{ secrets.DVC_S3_ACCESS_KEY }}"
          dvc remote modify minio secret_access_key "${{ secrets.DVC_S3_SECRET_KEY }}"

      - name: DVC pull data & artifacts
        run: |
          dvc pull -q || true

      - name: Reproduce pipeline (train model)
        run: |
          dvc repro

      - name: Run tests
        run: |
          pytest -q

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/bd-lab-1-6:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"